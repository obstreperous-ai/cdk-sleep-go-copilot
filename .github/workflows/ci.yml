name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

jobs:
  test-and-synth:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js (required by CDK CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk@2.1125.0

      - name: Download Go modules
        run: go mod download

      - name: Run unit tests
        run: go test ./...

      - name: CDK synth (smoke test)
        run: cdk synth
